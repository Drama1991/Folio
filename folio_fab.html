
<style>
*{box-sizing:border-box;margin:0;padding:0}
@keyframes sh{0%{background-position:-500px 0}100%{background-position:500px 0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fabIn{from{opacity:0;transform:scale(0.7) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes labelIn{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:translateX(0)}}
@keyframes expand{from{opacity:0;max-height:0}to{opacity:1;max-height:400px}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

:root{
  --bg:#F7F5F0;--bg2:#EEECEA;--text:#1C1C1A;--text2:#5F5E5A;--text3:#9F9D98;
  --border:#D8D6D0;--border2:#C8C6C0;--gold:#EF9F27;--r:10px;--r2:6px;
  --mono:'JetBrains Mono','Courier New',monospace;
}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text)}
.sk{background:linear-gradient(90deg,rgba(0,0,0,0.07) 25%,rgba(0,0,0,0.03) 50%,rgba(0,0,0,0.07) 75%);background-size:500px 100%;animation:sh 1.8s infinite linear;border-radius:4px}

/* ── HOST PAGE ── */
#host{max-width:860px;margin:0 auto;border:0.5px solid var(--border);border-radius:14px;overflow:hidden;background:var(--bg);position:relative;min-height:580px}

/* ── HEADER ── */
header{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:54px;border-bottom:0.5px solid var(--border)}
.nl{font-size:12px;color:var(--text2);padding:5px 11px;border-radius:var(--r2);cursor:pointer}
.nl:hover{background:var(--bg2)}
.nl.on{color:var(--text);font-weight:500;background:var(--bg2)}

/* ── FAB ── */
#fab-wrap{position:absolute;bottom:28px;right:28px;display:flex;align-items:center;gap:10px;animation:fabIn .3s cubic-bezier(.34,1.56,.64,1)}
#fab-label{font-size:12px;color:var(--text2);background:var(--bg);border:0.5px solid var(--border);padding:5px 12px;border-radius:999px;pointer-events:none;opacity:0;transform:translateX(8px);transition:opacity .15s,transform .15s;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
#fab-wrap:hover #fab-label{opacity:1;transform:translateX(0);animation:labelIn .15s ease}
#fab-btn{width:52px;height:60px;cursor:pointer;background:none;border:none;padding:0;position:relative;transition:transform .15s;flex-shrink:0}
#fab-btn:hover{transform:scale(1.06) translateY(-1px)}
#fab-btn:active{transform:scale(0.97)}
#fab-btn svg{filter:drop-shadow(0 4px 12px rgba(0,0,0,0.18))}

/* ── BACKDROP ── */
#backdrop{position:absolute;inset:0;background:rgba(20,20,18,0.5);z-index:50;display:none;align-items:center;justify-content:center;animation:fadeIn .15s ease;border-radius:14px}

/* ── MODAL ── */
#modal{background:var(--bg);border-radius:14px;width:100%;max-width:460px;max-height:82%;display:flex;flex-direction:column;overflow:hidden;animation:fadeUp .2s ease;box-shadow:0 24px 64px rgba(0,0,0,0.22);margin:0 20px}
.search-wrap{padding:16px 20px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px}
#search-input{flex:1;background:none;border:none;outline:none;font-size:15px;color:var(--text);font-family:inherit}
#search-input::placeholder{color:var(--text3)}
.result-row{display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;border-bottom:0.5px solid var(--border);transition:background .08s}
.result-row:hover{background:var(--bg2)}
.result-row:last-child{border-bottom:none}
.cov{width:34px;height:48px;border-radius:4px;flex-shrink:0}
.type-tag{font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:3px;flex-shrink:0}
#selected-card{padding:14px 20px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--bg2);animation:fadeIn .15s ease}
.status-btn{flex:1;padding:10px 6px;border-radius:var(--r2);border:0.5px solid var(--border);background:none;cursor:pointer;font-size:13px;color:var(--text2);display:flex;align-items:center;justify-content:center;gap:5px;transition:all .1s}
.status-btn:hover{border-color:var(--border2);background:var(--bg)}
.status-btn.on{border-color:var(--text);background:var(--text);color:var(--bg)}
.star{font-size:24px;cursor:pointer;color:var(--border);transition:color .1s;line-height:1}
.star.lit{color:var(--gold)}
.note-ta{width:100%;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r2);padding:10px 12px;font-size:13px;color:var(--text);font-family:inherit;resize:none;outline:none;line-height:1.6}
.note-ta:focus{border-color:var(--border2)}
.save-btn{width:100%;padding:13px;border-radius:var(--r2);background:var(--text);color:var(--bg);border:none;cursor:pointer;font-size:14px;font-weight:500}
.save-btn:hover{opacity:.85}
.save-btn:disabled{opacity:.3;cursor:default}
.toggle-link{font-size:12px;color:var(--text3);cursor:pointer;display:flex;align-items:center;gap:4px}
.toggle-link:hover{color:var(--text2)}

/* ── TOAST ── */
#toast{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);background:#1C1C1A;color:#F1EFE8;padding:10px 18px;border-radius:999px;font-size:12px;display:none;z-index:99;animation:fadeUp .2s ease;white-space:nowrap;pointer-events:none}
</style>

        <i class="ti ti-microphone" style="font-size:18px;color:var(--text2);display:block;margin-bottom:5px"></i>
        <p style="font-size:11px;color:var(--text2);margin-bottom:2px">播客</p>

  <!-- ★ FAB -->
  <div id="fab-wrap">

<script>
var searchTimer=null,currentStatus='',noteOpen=false;
var mockResults={

  '漫':[{title:'漫长的季节',type:'剧集',meta:'辛爽 · 2023 · 12集',cov:'linear-gradient(160deg,#C8E6A0,#4A7A28)'},{title:'漫画之神',type:'书籍',meta:'手塚治虫 · 1989',cov:'linear-gradient(160deg,#F4B5C2,#8C3B52)'}],
  'default':[{title:'花样年华',type:'电影',meta:'王家卫 · 2000',cov:'linear-gradient(160deg,#D9B5F4,#6B3B8C)'},{title:'挪威的森林',type:'书籍',meta:'村上春树 · 1987',cov:'linear-gradient(160deg,#F4B5C2,#8C3B52)'},{title:'请回答 1988',type:'剧集',meta:'申源浩 · 2015 · 20集',cov:'linear-gradient(160deg,#FAD4A0,#D4882A)'}]
};
var typeColors={'电影':['#EEF3FA','#3B5E8C'],'剧集':['#EEF6E8','#4A7A28'],'书籍':['#FEF4E8','#C25B1A'],'音乐':['#F5EEF8','#6B3B8C'],'播客':['#FEF0F3','#8C3B52']};
var starLabels={0:'未评分',1:'很差',2:'较差',3:'还行',4:'推荐',5:'力荐'};

function openModal(){
  var bd=document.getElementById('backdrop');
  bd.style.display='flex';
  setTimeout(()=>document.getElementById('search-input').focus(),60);
}
function closeModal(){
  document.getElementById('backdrop').style.display='none';
  resetAll();
}
function handleBackdropClick(e){if(e.target===document.getElementById('backdrop'))closeModal();}
function resetAll(){
  document.getElementById('search-input').value='';
  document.getElementById('clear-btn').style.display='none';
  document.getElementById('empty-state').style.display='block';
  document.getElementById('loading-state').style.display='none';
  document.getElementById('results').style.display='none';
  document.getElementById('results').innerHTML='';
  document.getElementById('step-search').style.display='block';
  document.getElementById('step-record').style.display='none';
  currentStatus='';noteOpen=false;
  document.querySelectorAll('.status-btn').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.star').forEach(s=>s.classList.remove('lit'));
  document.getElementById('star-label').textContent='未评分';
  document.getElementById('rating-section').style.display='none';
  document.getElementById('date-section').style.display='none';
  document.getElementById('note-toggle-wrap').style.display='none';
  document.getElementById('note-section').style.display='none';
  document.getElementById('save-btn').disabled=true;
}
function clearSearch(){
  document.getElementById('search-input').value='';
  document.getElementById('clear-btn').style.display='none';
  document.getElementById('empty-state').style.display='block';
  document.getElementById('loading-state').style.display='none';
  document.getElementById('results').style.display='none';
  document.getElementById('search-input').focus();
}
function onSearch(val){
  document.getElementById('clear-btn').style.display=val?'block':'none';
  clearTimeout(searchTimer);
  if(!val.trim()){clearSearch();return;}
  document.getElementById('empty-state').style.display='none';
  document.getElementById('loading-state').style.display='block';
  document.getElementById('results').style.display='none';
  searchTimer=setTimeout(()=>{
    var key=Object.keys(mockResults).find(k=>val.includes(k))||'default';
    renderResults(mockResults[key]);
  },600);
}
function renderResults(items){
  document.getElementById('loading-state').style.display='none';
  var el=document.getElementById('results');
  el.innerHTML='';
  items.forEach(item=>{
    var tc=typeColors[item.type]||['var(--bg2)','var(--text2)'];
    var row=document.createElement('div');
    row.className='result-row';
    row.innerHTML=`<div class="cov" style="background:${item.cov}"></div><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:7px;margin-bottom:3px"><p style="font-size:14px;font-weight:500;color:var(--text)">${item.title}</p><span class="type-tag" style="background:${tc[0]};color:${tc[1]}">${item.type}</span></div><p style="font-family:var(--mono);font-size:11px;color:var(--text3)">${item.meta}</p></div><i class="ti ti-chevron-right" style="font-size:13px;color:var(--text3);flex-shrink:0"></i>`;
    row.onclick=()=>selectItem(item);
    el.appendChild(row);
  });
  el.style.display='block';
}
function selectItem(item){
  var tc=typeColors[item.type]||['var(--bg2)','var(--text2)'];
  document.getElementById('sel-cov').style.background=item.cov;
  document.getElementById('sel-title').textContent=item.title;
  document.getElementById('sel-type').textContent=item.type;
  document.getElementById('sel-type').style.background=tc[0];
  document.getElementById('sel-type').style.color=tc[1];
  document.getElementById('sel-meta').textContent=item.meta;
  var isDone=document.getElementById('s-done');
  var isWatch=document.getElementById('s-watching');
  var verb=item.type==='书籍'?'读过':item.type==='音乐'?'听过':'看过';
  var verb2=item.type==='书籍'?'在读':item.type==='音乐'?'在听':'在看';
  isDone.innerHTML=`<i class="ti ti-check" style="font-size:12px"></i> ${verb}`;
  isWatch.innerHTML=`<i class="ti ti-player-play" style="font-size:12px"></i> ${verb2}`;
  document.getElementById('step-search').style.display='none';
  document.getElementById('step-record').style.display='flex';
}
function backToSearch(){
  document.getElementById('step-search').style.display='block';
  document.getElementById('step-record').style.display='none';
  currentStatus='';
  document.querySelectorAll('.status-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('rating-section').style.display='none';
  document.getElementById('date-section').style.display='none';
  document.getElementById('note-toggle-wrap').style.display='none';
  document.getElementById('save-btn').disabled=true;
}
function setStatus(s){
  currentStatus=s;
  document.querySelectorAll('.status-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('s-'+s).classList.add('on');
  document.getElementById('rating-section').style.display=s==='done'?'block':'none';
  document.getElementById('date-section').style.display=s!=='wish'?'block':'none';
  document.getElementById('note-toggle-wrap').style.display=s!=='wish'?'block':'none';
  document.getElementById('save-btn').disabled=false;
}
function setStar(v){
  document.querySelectorAll('.star').forEach((s,i)=>s.classList.toggle('lit',i<v));
  document.getElementById('star-label').textContent=starLabels[v];
}
function toggleNote(){
  noteOpen=!noteOpen;
  document.getElementById('note-section').style.display=noteOpen?'block':'none';
  document.getElementById('note-toggle').innerHTML=noteOpen?'<i class="ti ti-x" style="font-size:12px"></i> 收起短评':'<i class="ti ti-pencil" style="font-size:12px"></i> 添加短评';
  if(noteOpen)document.getElementById('note-input').focus();
}
function saveRecord(){
  var title=document.getElementById('sel-title').textContent;
  var map={done:'看过',watching:'在看',wish:'想看'};
  closeModal();
  var t=document.getElementById('toast');
  t.textContent='✓ 已记录「'+title+'」为'+map[currentStatus];
  t.style.display='block';
  setTimeout(()=>t.style.display='none',2600);
}
</script>
