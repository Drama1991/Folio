
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>写长评 · Folio</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/iconfont/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F5F0;--bg2:#EEECEA;--text:#1C1C1A;--text2:#5F5E5A;--text3:#9F9D98;
  --border:#D8D6D0;--border2:#C8C6C0;--gold:#EF9F27;
  --serif:'Noto Serif SC',Georgia,serif;
  --mono:'JetBrains Mono','Courier New',monospace;
  --r:10px;--r2:6px;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;display:flex;flex-direction:column}

header{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:60px;border-bottom:0.5px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10}
.back{display:flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;color:var(--text2);font-size:13px;font-family:inherit;padding:5px 10px;border-radius:var(--r2)}
.back:hover{background:var(--bg2);color:var(--text)}
.hdr-mid{display:flex;align-items:center;gap:10px}
.hdr-title{font-family:var(--serif);font-size:15px;font-weight:500;letter-spacing:-0.01em}
.medium-tag{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:3px;letter-spacing:.04em}
.medium-tag.movie{background:#EEF3FA;color:#3B5E8C}
.medium-tag.series{background:#EEF6E8;color:#4A7A28}
.medium-tag.book{background:#FEF4E8;color:#C25B1A}
.medium-tag.music{background:#F5EEF8;color:#6B3B8C}
.medium-tag.podcast{background:#FEF0F3;color:#8C3B52}
.hdr-right{display:flex;align-items:center;gap:10px}
.save-state{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--text3)}
.save-state .dot{width:5px;height:5px;border-radius:50%;background:var(--text3)}
.save-state.dirty .dot{background:var(--gold)}
.save-state.saved .dot{background:#4A7A28}
.btn-ghost{padding:6px 12px;border-radius:var(--r2);border:0.5px solid var(--border);background:none;cursor:pointer;font-size:12px;color:var(--text2);font-family:inherit}
.btn-ghost:hover{background:var(--bg2);color:var(--text)}
.btn-primary{padding:6px 14px;border-radius:var(--r2);background:var(--text);color:var(--bg);border:none;cursor:pointer;font-size:12px;font-family:inherit;font-weight:500}
.btn-primary:hover{opacity:.85}
.btn-primary:disabled{opacity:.35;cursor:default}

main{flex:1;max-width:720px;width:100%;margin:0 auto;padding:36px 24px 90px;animation:fadeUp .22s ease}

.item-card{display:flex;gap:14px;padding:16px;background:var(--bg2);border-radius:var(--r);margin-bottom:28px;animation:fadeIn .15s ease}
.item-cov{width:56px;height:80px;border-radius:4px;flex-shrink:0;background:var(--border)}
.item-info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
.item-title{font-family:var(--serif);font-size:18px;font-weight:500;line-height:1.2;letter-spacing:-0.01em}
.item-titleen{font-family:var(--mono);font-size:11px;color:var(--text3);margin-top:3px}
.item-meta{font-family:var(--mono);font-size:11px;color:var(--text2);margin-top:8px}

.rating-row{display:flex;align-items:center;gap:14px;margin-bottom:30px}
.rating-stars{display:flex;gap:5px}
.rating-stars i{font-size:26px;color:var(--border);cursor:pointer;transition:color .1s}
.rating-stars i.on{color:var(--gold)}
.rating-label{font-family:var(--mono);font-size:12px;color:var(--text3)}

.field-title{width:100%;background:none;border:none;border-bottom:0.5px solid var(--border);font-family:var(--serif);font-size:26px;font-weight:500;letter-spacing:-0.01em;line-height:1.3;color:var(--text);padding:10px 0;outline:none;margin-bottom:24px;transition:border-color .15s}
.field-title::placeholder{color:var(--text3);font-weight:400}
.field-title:focus{border-bottom-color:var(--text2)}

.field-body{width:100%;background:none;border:none;font-family:var(--serif);font-size:16px;line-height:1.85;color:var(--text);padding:0;outline:none;resize:none;min-height:55vh;display:block}
.field-body::placeholder{color:var(--text3);line-height:1.85;font-style:italic}

.tag-row{display:flex;align-items:center;gap:10px;margin-top:32px;padding-top:18px;border-top:0.5px solid var(--border)}
.tag-label{font-family:var(--mono);font-size:11px;color:var(--text3);flex-shrink:0;letter-spacing:.04em}
.tag-input{flex:1;background:none;border:none;font-family:inherit;font-size:13px;color:var(--text);padding:6px 0;outline:none}
.tag-input::placeholder{color:var(--text3)}

footer{position:sticky;bottom:0;border-top:0.5px solid var(--border);background:var(--bg);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--text3)}
.kbd{display:inline-block;padding:1px 5px;background:var(--bg2);border:0.5px solid var(--border);border-radius:3px;font-size:9px;color:var(--text2)}

#toast{position:fixed;bottom:64px;left:50%;transform:translateX(-50%);background:#1C1C1A;color:#F1EFE8;padding:11px 20px;border-radius:999px;font-size:13px;display:none;z-index:200;animation:fadeUp .2s ease;white-space:nowrap;pointer-events:none}
#toast.show{display:block}
</style>
</head>
<body>

<header>
  <button class="back" onclick="goBack()">
    <i class="ti ti-arrow-left" style="font-size:14px"></i>
    返回
  </button>
  <div class="hdr-mid">
    <span class="medium-tag movie" id="medium-tag">电影</span>
    <span class="hdr-title">写长评</span>
  </div>
  <div class="hdr-right">
    <span class="save-state" id="save-state"><span class="dot"></span><span id="save-state-text">起草中</span></span>
    <button class="btn-ghost" onclick="saveDraft()">保存草稿</button>
    <button class="btn-primary" id="publish-btn" onclick="publish()" disabled>发布</button>
  </div>
</header>

<main>

  <div class="item-card">
    <div class="item-cov" id="item-cov"></div>
    <div class="item-info">
      <p class="item-title" id="item-title">未指定条目</p>
      <p class="item-titleen" id="item-titleen"></p>
      <p class="item-meta" id="item-meta">请从详情页进入</p>
    </div>
  </div>

  <div class="rating-row">
    <div class="rating-stars" id="stars">
      <i class="ti ti-star-filled" onclick="setRating(1)"></i>
      <i class="ti ti-star-filled" onclick="setRating(2)"></i>
      <i class="ti ti-star-filled" onclick="setRating(3)"></i>
      <i class="ti ti-star-filled" onclick="setRating(4)"></i>
      <i class="ti ti-star-filled" onclick="setRating(5)"></i>
    </div>
    <span class="rating-label" id="rating-label">未评分</span>
  </div>

  <input class="field-title" id="field-title" placeholder="给这次记录起一个标题…" oninput="onChange()"/>
  <textarea class="field-body" id="field-body" placeholder="今晚把它写下来吧。让一个具体的瞬间带你回到当时的感受——开场的某个镜头、一句台词、合上书的那个停顿。从那里开始。" oninput="onChange()" onblur="saveDraft(true)"></textarea>

  <div class="tag-row">
    <span class="tag-label">标签</span>
    <input class="tag-input" id="field-tags" placeholder="电影笔记, 文学, 救赎（逗号分隔）" oninput="onChange()"/>
  </div>

</main>

<footer>
  <span><span id="word-count">0</span> 字</span>
  <span id="footer-mid"></span>
  <span><span class="kbd">⌘</span> <span class="kbd">S</span> 保存草稿 · <span class="kbd">⌘</span> <span class="kbd">↵</span> 发布</span>
</footer>

<div id="toast"></div>

<script>
var ctx = {};
try{ctx = JSON.parse(sessionStorage.getItem('folio:review-context')||'{}')}catch(e){}
var rating = ctx.rating || 0;
var lastSaved = null;
var dirty = false;

function init(){
  if(!ctx.id){
    document.getElementById('publish-btn').disabled = true;
    document.getElementById('save-state-text').textContent = '无上下文';
    return;
  }
  document.getElementById('item-cov').style.background = ctx.cov || 'var(--border)';
  document.getElementById('item-title').textContent = ctx.title || '';
  document.getElementById('item-titleen').textContent = ctx.titleEn || '';
  document.getElementById('item-meta').textContent = ctx.meta || '';
  var tag = document.getElementById('medium-tag');
  tag.textContent = ctx.mediumLabel || '电影';
  tag.className = 'medium-tag ' + (ctx.medium || 'movie');
  document.title = '写长评：' + (ctx.title || '未命名') + ' · Folio';
  if(rating > 0) renderStars(rating);
  var draftKey = 'folio:review-draft:' + ctx.id;
  var draftRaw = sessionStorage.getItem(draftKey);
  if(draftRaw){
    try{
      var draft = JSON.parse(draftRaw);
      document.getElementById('field-title').value = draft.title || '';
      document.getElementById('field-body').value = draft.body || '';
      document.getElementById('field-tags').value = draft.tags || '';
      if(draft.rating){rating = draft.rating; renderStars(rating)}
      lastSaved = draft.savedAt;
      updateSaveState('saved');
      updateWordCount();
      updateFooterMid();
      updatePublishBtn();
    }catch(e){}
  }
  setTimeout(function(){
    document.getElementById('field-title').focus();
  }, 100);
}

function renderStars(v){
  var stars = document.querySelectorAll('#stars i');
  stars.forEach(function(s,i){s.classList.toggle('on', i<v)});
  var labels = {0:'未评分',1:'很差',2:'较差',3:'还行',4:'推荐',5:'力荐'};
  document.getElementById('rating-label').textContent = labels[v];
}

function setRating(v){
  rating = v;
  renderStars(v);
  onChange();
}

function onChange(){
  dirty = true;
  updateSaveState('dirty');
  updatePublishBtn();
  updateWordCount();
}

function updateSaveState(state){
  var s = document.getElementById('save-state');
  s.classList.remove('saved','dirty');
  if(state) s.classList.add(state);
  var txt = state === 'saved' ? '已保存' : state === 'dirty' ? '未保存' : '起草中';
  document.getElementById('save-state-text').textContent = txt;
}

function updatePublishBtn(){
  var title = document.getElementById('field-title').value.trim();
  var body = document.getElementById('field-body').value.trim();
  document.getElementById('publish-btn').disabled = !(ctx.id && title && body.length >= 20);
}

function updateWordCount(){
  var body = document.getElementById('field-body').value;
  document.getElementById('word-count').textContent = body.length;
}

function updateFooterMid(){
  if(!lastSaved){document.getElementById('footer-mid').textContent = ''; return}
  var diff = Math.floor((Date.now() - lastSaved) / 1000);
  var txt = diff < 5 ? '刚刚保存' : diff < 60 ? diff + ' 秒前保存' : Math.floor(diff/60) + ' 分钟前保存';
  document.getElementById('footer-mid').textContent = txt;
}
setInterval(updateFooterMid, 10000);

function saveDraft(silent){
  if(!ctx.id) return;
  if(!dirty && silent) return;
  var draft = {
    title: document.getElementById('field-title').value,
    body: document.getElementById('field-body').value,
    tags: document.getElementById('field-tags').value,
    rating: rating,
    savedAt: Date.now()
  };
  sessionStorage.setItem('folio:review-draft:' + ctx.id, JSON.stringify(draft));
  lastSaved = draft.savedAt;
  dirty = false;
  updateSaveState('saved');
  updateFooterMid();
  if(!silent) showToast('草稿已保存');
}

function publish(){
  if(!ctx.id) return;
  var title = document.getElementById('field-title').value.trim();
  var body = document.getElementById('field-body').value.trim();
  if(!title || body.length < 20) return;
  sessionStorage.setItem('folio:review-published:' + ctx.id, JSON.stringify({
    id: ctx.id,
    title: title,
    body: body,
    tags: document.getElementById('field-tags').value,
    rating: rating,
    publishedAt: Date.now()
  }));
  sessionStorage.removeItem('folio:review-draft:' + ctx.id);
  location.href = 'folio_full_prototype.html' + (ctx.returnHash || '#detail');
}

function goBack(){
  if(dirty) saveDraft(true);
  if(window.history.length > 1 && document.referrer){
    history.back();
  } else {
    location.href = 'folio_full_prototype.html' + (ctx.returnHash || '#detail');
  }
}

function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')}, 2500);
}

document.addEventListener('keydown', function(e){
  if((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 's'){
    e.preventDefault();
    saveDraft();
  } else if((e.metaKey || e.ctrlKey) && e.key === 'Enter'){
    e.preventDefault();
    publish();
  } else if(e.key === 'Escape'){
    if(document.activeElement && (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA')){
      document.activeElement.blur();
    }
  }
});

init();
</script>
</body>
</html>
